pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx,mjs,cjs}"
      run: npx eslint {staged_files} --report-unused-disable-directives --max-warnings 0
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
    test:
      run: npx vitest --run
